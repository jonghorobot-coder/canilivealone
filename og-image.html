<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>독립점수 OG Image</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @font-face {
      font-family: 'Pretendard';
      src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .og-container {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #ffffff 0%, #f7f7f7 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* 배경 장식 요소 */
    .bg-accent {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(15, 61, 46, 0.03) 0%, transparent 70%);
      top: -200px;
      right: -100px;
    }

    .bg-accent-2 {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(15, 61, 46, 0.02) 0%, transparent 70%);
      bottom: -150px;
      left: -50px;
    }

    /* 메인 컨텐츠 */
    .content {
      display: flex;
      align-items: center;
      gap: 80px;
      z-index: 1;
    }

    /* 왼쪽: 텍스트 영역 */
    .text-section {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-icon {
      width: 44px;
      height: 44px;
      background: #0F3D2E;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-icon svg {
      width: 24px;
      height: 24px;
      color: white;
    }

    .brand-name {
      font-size: 28px;
      font-weight: 700;
      color: #0F3D2E;
      letter-spacing: -0.02em;
    }

    .main-title {
      font-size: 42px;
      font-weight: 700;
      color: #171717;
      line-height: 1.3;
      letter-spacing: -0.03em;
    }

    .subtitle {
      font-size: 18px;
      color: #737373;
      letter-spacing: -0.01em;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(15, 61, 46, 0.08);
      padding: 10px 18px;
      border-radius: 8px;
      width: fit-content;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      background: #0F3D2E;
      border-radius: 50%;
    }

    .badge-text {
      font-size: 14px;
      font-weight: 600;
      color: #0F3D2E;
      letter-spacing: -0.01em;
    }

    /* 오른쪽: 카드 UI */
    .card-section {
      position: relative;
    }

    .result-card {
      width: 320px;
      background: white;
      border-radius: 20px;
      box-shadow:
        0 4px 6px -1px rgba(0, 0, 0, 0.05),
        0 20px 40px -10px rgba(0, 0, 0, 0.1),
        0 0 0 1px rgba(0, 0, 0, 0.03);
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-label {
      font-size: 12px;
      font-weight: 500;
      color: #a3a3a3;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .card-grade {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(15, 61, 46, 0.1);
      padding: 6px 12px;
      border-radius: 6px;
    }

    .grade-text {
      font-size: 13px;
      font-weight: 700;
      color: #0F3D2E;
    }

    /* 점수 게이지 */
    .score-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .score-gauge {
      position: relative;
      width: 160px;
      height: 80px;
      overflow: hidden;
    }

    .gauge-bg {
      position: absolute;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 14px solid #e5e5e5;
      border-bottom-color: transparent;
      border-left-color: transparent;
      transform: rotate(-45deg);
    }

    .gauge-fill {
      position: absolute;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 14px solid #0F3D2E;
      border-bottom-color: transparent;
      border-left-color: transparent;
      transform: rotate(85deg); /* 72% 위치 */
    }

    .score-value {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: baseline;
      gap: 2px;
    }

    .score-number {
      font-size: 48px;
      font-weight: 700;
      color: #171717;
      letter-spacing: -0.03em;
    }

    .score-unit {
      font-size: 20px;
      font-weight: 600;
      color: #a3a3a3;
    }

    .score-label {
      font-size: 13px;
      color: #737373;
      text-align: center;
    }

    /* 잔액 정보 */
    .balance-section {
      background: #fafafa;
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .balance-label {
      font-size: 13px;
      color: #737373;
    }

    .balance-value {
      font-size: 18px;
      font-weight: 700;
      color: #0F3D2E;
      letter-spacing: -0.02em;
    }

    .balance-value::before {
      content: '+';
      font-weight: 500;
    }

    /* 하단 바 */
    .card-footer {
      display: flex;
      gap: 8px;
    }

    .footer-bar {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: #e5e5e5;
    }

    .footer-bar.active {
      background: #0F3D2E;
    }

    .footer-bar:nth-child(1) { flex: 2; }
    .footer-bar:nth-child(2) { flex: 1.5; }
    .footer-bar:nth-child(3) { flex: 1; }
    .footer-bar:nth-child(4) { flex: 0.8; }

    /* 우측 하단 URL */
    .url-badge {
      position: absolute;
      bottom: 32px;
      right: 48px;
      font-size: 13px;
      color: #a3a3a3;
      letter-spacing: -0.01em;
    }
  </style>
</head>
<body>
  <div class="og-container">
    <!-- 배경 장식 -->
    <div class="bg-accent"></div>
    <div class="bg-accent-2"></div>

    <div class="content">
      <!-- 왼쪽: 텍스트 -->
      <div class="text-section">
        <div class="brand">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
          </div>
          <span class="brand-name">독립점수</span>
        </div>

        <h1 class="main-title">
          나는 지금<br>
          독립할 준비가<br>
          되었을까?
        </h1>

        <p class="subtitle">
          수입과 지출 구조로 보는 독립 가능성 진단
        </p>

        <div class="badge">
          <span class="badge-dot"></span>
          <span class="badge-text">25개 항목 종합 재무 진단</span>
        </div>
      </div>

      <!-- 오른쪽: 카드 UI -->
      <div class="card-section">
        <div class="result-card">
          <div class="card-header">
            <span class="card-label">Result</span>
            <div class="card-grade">
              <span class="grade-text">안정</span>
            </div>
          </div>

          <div class="score-section">
            <div class="score-gauge">
              <div class="gauge-bg"></div>
              <div class="gauge-fill"></div>
              <div class="score-value">
                <span class="score-number">72</span>
                <span class="score-unit">점</span>
              </div>
            </div>
            <span class="score-label">독립 준비 점수</span>
          </div>

          <div class="balance-section">
            <span class="balance-label">월 예상 잔액</span>
            <span class="balance-value">45만원</span>
          </div>

          <div class="card-footer">
            <div class="footer-bar active"></div>
            <div class="footer-bar active"></div>
            <div class="footer-bar active"></div>
            <div class="footer-bar"></div>
          </div>
        </div>
      </div>
    </div>

    <span class="url-badge">canilivealone.com</span>
  </div>
</body>
</html>
